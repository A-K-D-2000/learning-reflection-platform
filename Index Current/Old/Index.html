<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Explain It Later</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background-color: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
            font-size: 20px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin-bottom: 15px;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: white;
            font-size: 14px;
            display: block;
            padding: 8px;
            border-radius: 5px;
        }

        .sidebar ul li a:hover {
            background-color: #334155;
        }

        /* Main Content */
        .main {
            flex: 1;
            background-color: #f1f5f9;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Dashboard Cards */
        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card h3 {
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Explain It Later</h2>
        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Add Learning Item</a></li>
            <li><a href="#">My Learning Items</a></li>
            <li><a href="#">Reminders</a></li>
            <li><a href="#">Analytics</a></li>
            <li><a href="#">Profile</a></li>
            <li><a href="#">Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">
        
        <div class="header">
            <h1>Dashboard</h1>
            <p>Track your learning clarity and readiness.</p>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Total Learning Items</h3>
                <p>12</p>
            </div>

            <div class="card">
                <h3>Confused Topics</h3>
                <p>5</p>
            </div>

            <div class="card">
                <h3>Upcoming Readiness Dates</h3>
                <p>3</p>
            </div>
        </div>

    </div>

</body>
</html>
