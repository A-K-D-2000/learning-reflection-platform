<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Learning Item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="add-item.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Explain It Later</h2>
        <ul>
            <li><a href="Index2.html">Dashboard</a></li>
            <li><a href="add-item.html">Add Learning Item</a></li>
            <li><a href="my-items.html">My Learning Items</a></li>
            <li><a href="#">Reminders</a></li>
            <li><a href="#">Analytics</a></li>
            <li><a href="#">Profile</a></li>
            <li><a href="#">Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="header">
            <h1>Add Learning Item</h1>
            <p>Add a link you want to understand later.</p>
        </div>

        <div class="form-container">
            <form>

                <!-- Resource Link -->
                <div class="form-group">
                    <label>Resource Link</label>
                    <input type="url" placeholder="Paste YouTube / Blog / Article link">
                </div>

                <!-- Topic Name -->
                <div class="form-group">
                    <label>Topic Name</label>
                    <input type="text" placeholder="Enter concept or topic name">
                </div>

                <!-- Clarity Level -->
                <div class="form-group">
                    <label>Current Clarity Level</label>
                    <select>
                        <option>Confused</option>
                        <option>Partially Clear</option>
                        <option>Clear</option>
                    </select>
                </div>

                <!-- Difficulty Reason -->
                <div class="form-group">
                    <label>Reason for Difficulty</label>
                    <select>
                        <option>Missing prerequisites</option>
                        <option>Need examples</option>
                        <option>Need visuals/diagrams</option>
                        <option>Time constraints</option>
                    </select>
                </div>

                <!-- Priority -->
                <div class="form-group">
                    <label>Priority Level</label>
                    <select>
                        <option>High</option>
                        <option>Medium</option>
                        <option>Low</option>
                    </select>
                </div>

                <!-- Target Date -->
                <div class="form-group">
                    <label>Target Readiness Date</label>
                    <input type="date">
                </div>

                <button type="submit" class="submit-btn">
                    Add Learning Item
                </button>

            </form>
        </div>

    </div>

</body>
</html>
