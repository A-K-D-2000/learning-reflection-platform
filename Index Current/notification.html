<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="notification.css">
</head>
<body>

    <div class="header">
        <h2>Notifications</h2>

        <div class="notification">

            <p>You marked MongoDB topic as clear.</p>
            <span class="time">Yesterday</span>
        </div>

        <div class="notification due">
            <h4>Deadline</h4>
            <p>System Design Basics is due tomorrow.</p>
            <span class="time">Urgent</span>
        </div>

    </div>

</body>
</html>
